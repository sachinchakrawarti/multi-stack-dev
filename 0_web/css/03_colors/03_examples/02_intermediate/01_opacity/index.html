<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Opacity Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS Opacity</h1>

    <p>
        The <strong>opacity</strong> property controls the transparency of an entire element.
    </p>

    <div class="box opacity100">
        Opacity: 1
    </div>

    <div class="box opacity75">
        Opacity: 0.75
    </div>

    <div class="box opacity50">
        Opacity: 0.50
    </div>

    <div class="box opacity25">
        Opacity: 0.25
    </div>

    <div class="box opacity10">
        Opacity: 0.10
    </div>

</body>
</html>
