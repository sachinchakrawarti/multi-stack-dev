<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS currentColor Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS currentColor</h1>

    <p>
        The <strong>currentColor</strong> keyword uses the current value of the
        <code>color</code> property.
    </p>

    <div class="card blue">
        <h2>Blue Card</h2>
        <p>The border and button use <code>currentColor</code>.</p>
        <button>Learn More</button>
    </div>

    <div class="card green">
        <h2>Green Card</h2>
        <p>Changing the text color automatically updates related elements.</p>
        <button>Learn More</button>
    </div>

    <div class="card crimson">
        <h2>Crimson Card</h2>
        <p><code>currentColor</code> helps avoid duplicate color values.</p>
        <button>Learn More</button>
    </div>

</body>
</html>
