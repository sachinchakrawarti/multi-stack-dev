<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS transparent Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS transparent Keyword</h1>

    <p>
        The <strong>transparent</strong> keyword creates a fully transparent color.
    </p>

    <div class="box normal">
        Normal Background
    </div>

    <div class="box transparent-bg">
        Transparent Background
    </div>

    <div class="box transparent-border">
        Transparent Border
    </div>

    <button class="btn">Hover Me</button>

</body>
</html>
