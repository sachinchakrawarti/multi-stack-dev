<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Color Names Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS Color Names</h1>

    <p class="red">This text is Red.</p>
    <p class="blue">This text is Blue.</p>
    <p class="green">This text is Green.</p>
    <p class="purple">This text is Purple.</p>
    <p class="orange">This text is Orange.</p>

    <div class="box gold">Gold</div>
    <div class="box coral">Coral</div>
    <div class="box tomato">Tomato</div>
    <div class="box teal">Teal</div>
    <div class="box crimson">Crimson</div>

</body>
</html>
