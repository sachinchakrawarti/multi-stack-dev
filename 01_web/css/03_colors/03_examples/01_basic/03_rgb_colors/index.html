<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS RGB Colors Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS RGB Colors</h1>

    <p class="red">RGB Red (255, 0, 0)</p>
    <p class="green">RGB Green (0, 128, 0)</p>
    <p class="blue">RGB Blue (0, 0, 255)</p>
    <p class="purple">RGB Purple (128, 0, 128)</p>

    <div class="box red-bg">rgb(255, 0, 0)</div>
    <div class="box green-bg">rgb(0, 128, 0)</div>
    <div class="box blue-bg">rgb(0, 0, 255)</div>
    <div class="box orange-bg">rgb(255, 165, 0)</div>
    <div class="box gray-bg">rgb(96, 125, 139)</div>

</body>
</html>
