<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS HSLA Colors Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS HSLA Colors</h1>

    <p>
        HSLA adds an <strong>Alpha (Transparency)</strong> value to the HSL color model.
    </p>

    <div class="box alpha100">
        hsla(210, 80%, 45%, 1)
    </div>

    <div class="box alpha75">
        hsla(210, 80%, 45%, 0.75)
    </div>

    <div class="box alpha50">
        hsla(210, 80%, 45%, 0.50)
    </div>

    <div class="box alpha25">
        hsla(210, 80%, 45%, 0.25)
    </div>

    <div class="box alpha10">
        hsla(210, 80%, 45%, 0.10)
    </div>

</body>
</html>
