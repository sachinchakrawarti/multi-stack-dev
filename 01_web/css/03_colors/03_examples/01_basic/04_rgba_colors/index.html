<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS RGBA Colors Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS RGBA Colors</h1>

    <p>
        RGBA adds an <strong>Alpha (Transparency)</strong> value to the RGB color model.
    </p>

    <div class="box alpha100">
        rgba(21, 101, 192, 1)
    </div>

    <div class="box alpha75">
        rgba(21, 101, 192, 0.75)
    </div>

    <div class="box alpha50">
        rgba(21, 101, 192, 0.50)
    </div>

    <div class="box alpha25">
        rgba(21, 101, 192, 0.25)
    </div>

    <div class="box alpha10">
        rgba(21, 101, 192, 0.10)
    </div>

</body>
</html>
