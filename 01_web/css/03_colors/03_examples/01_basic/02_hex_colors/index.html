<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS HEX Colors Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS HEX Colors</h1>

    <p class="primary">Primary Color (#1565C0)</p>
    <p class="success">Success Color (#2E7D32)</p>
    <p class="warning">Warning Color (#F9A825)</p>
    <p class="danger">Danger Color (#D32F2F)</p>

    <div class="box blue">#1565C0</div>
    <div class="box green">#2E7D32</div>
    <div class="box yellow">#F9A825</div>
    <div class="box red">#D32F2F</div>
    <div class="box gray">#455A64</div>

</body>
</html>
