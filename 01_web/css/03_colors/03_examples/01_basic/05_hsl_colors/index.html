<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS HSL Colors Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS HSL Colors</h1>

    <p>
        HSL stands for <strong>Hue</strong>,
        <strong>Saturation</strong>, and
        <strong>Lightness</strong>.
    </p>

    <div class="box red">
        hsl(0, 100%, 50%)
    </div>

    <div class="box yellow">
        hsl(60, 100%, 50%)
    </div>

    <div class="box green">
        hsl(120, 100%, 40%)
    </div>

    <div class="box cyan">
        hsl(180, 100%, 40%)
    </div>

    <div class="box blue">
        hsl(240, 100%, 50%)
    </div>

    <div class="box purple">
        hsl(280, 100%, 50%)
    </div>

</body>
</html>
