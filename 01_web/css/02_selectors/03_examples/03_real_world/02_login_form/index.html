<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">

    <form class="login-card">

        <h1>Welcome Back</h1>

        <p class="subtitle">
            Sign in to continue
        </p>

        <label for="email">
            Email Address
        </label>

        <input
            type="email"
            id="email"
            placeholder="Enter your email"
        >

        <label for="password">
            Password
        </label>

        <input
            type="password"
            id="password"
            placeholder="Enter your password"
        >

        <div class="options">

            <label>
                <input type="checkbox">
                Remember Me
            </label>

            <a href="#">
                Forgot Password?
            </a>

        </div>

        <button type="submit">
            Login
        </button>

        <p class="register">
            Don't have an account?
            <a href="#">
                Register
            </a>
        </p>

    </form>

</div>

</body>
</html>
