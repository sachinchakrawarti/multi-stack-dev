<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="product-card">

        <img
            src="https://picsum.photos/400/250"
            alt="Product Image"
        >

        <div class="product-content">

            <span class="category">
                Electronics
            </span>

            <h2>
                Wireless Headphones
            </h2>

            <p>
                Enjoy premium sound quality, active noise cancellation,
                and up to 40 hours of battery life.
            </p>

            <div class="price-rating">

                <span class="price">
                    ₹4,999
                </span>

                <span class="rating">
                    ⭐ 4.8
                </span>

            </div>

            <button>
                Buy Now
            </button>

        </div>

    </div>

</div>

</body>
</html>
