<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiple Classes Example</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Using Multiple Classes</h1>

        <p>
            One HTML element can have multiple classes separated by spaces.
        </p>

        <hr>

        <button class="btn primary">
            Primary Button
        </button>

        <button class="btn secondary">
            Secondary Button
        </button>

        <button class="btn success large">
            Success Large
        </button>

        <button class="btn danger rounded">
            Danger Rounded
        </button>

        <button class="btn primary large rounded">
            Large Rounded Primary
        </button>

        <hr>

        <div class="card shadow rounded">
            <h2>Reusable Components</h2>

            <p>
                Classes can be combined to create different UI variations without duplicating CSS.
            </p>
        </div>

    </div>

</body>
</html>
