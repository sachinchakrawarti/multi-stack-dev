<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Selector Example</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="header">
        <h1>CSS ID Selector</h1>
    </header>

    <section id="hero">
        <h2>Welcome</h2>

        <p>
            ID selectors are used for unique elements on a webpage.
        </p>
    </section>

    <section id="about">
        <h2>About CSS</h2>

        <p>
            Each ID should appear only once in an HTML document.
        </p>
    </section>

    <section id="contact">
        <h2>Contact</h2>

        <button>
            Contact Us
        </button>
    </section>

    <footer id="footer">
        © 2026 CSS Learning Course
    </footer>

</body>
</html>
