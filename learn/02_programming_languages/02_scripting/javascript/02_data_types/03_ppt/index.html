<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Data Types - React PPT</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="root"></div>

    <!-- JS Data Files -->
    <script src="./js/data.js"></script>
    <script src="./js/slides.js"></script>

    <!-- Components -->
    <script src="./components/FullscreenButton.jsx" type="text/babel"></script>
    <script src="./components/Header.jsx" type="text/babel"></script>
    <script src="./components/Footer.jsx" type="text/babel"></script>
    <script src="./components/ProgressBar.jsx" type="text/babel"></script>
    <script src="./components/SlideCounter.jsx" type="text/babel"></script>
    <script src="./components/Timer.jsx" type="text/babel"></script>
    <script src="./components/AutoPlayButton.jsx" type="text/babel"></script>
    <script src="./components/ExportButton.jsx" type="text/babel"></script>
    <script src="./components/HelpOverlay.jsx" type="text/babel"></script>
    <script src="./components/SettingsPanel.jsx" type="text/babel"></script>
    <script src="./components/Navigation.jsx" type="text/babel"></script>
    
    <!-- Slide Types -->
    <script src="./components/SlideTypes/TitleSlide.jsx" type="text/babel"></script>
    <script src="./components/SlideTypes/BulletsSlide.jsx" type="text/babel"></script>
    <script src="./components/SlideTypes/CodeSlide.jsx" type="text/babel"></script>
    <script src="./components/SlideTypes/TableSlide.jsx" type="text/babel"></script>
    <script src="./components/SlideTypes/QASlide.jsx" type="text/babel"></script>
    <script src="./components/SlideTypes/SummarySlide.jsx" type="text/babel"></script>
    <script src="./components/SlideTypes/EndSlide.jsx" type="text/babel"></script>
    
    <!-- Slide Renderer -->
    <script src="./components/SlideRenderer.jsx" type="text/babel"></script>

    <!-- Main App -->
    <script type="text/babel" src="./js/app.js"></script>
</body>
</html>
