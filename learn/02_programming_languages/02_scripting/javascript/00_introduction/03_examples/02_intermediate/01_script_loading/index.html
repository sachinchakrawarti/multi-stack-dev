<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01 - Script Loading</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1 id="heading">JavaScript Script Loading</h1>

        <p>
            This example demonstrates loading an external JavaScript file at the end of the
            <code>&lt;body&gt;</code> element.
        </p>

        <button id="loadBtn">
            Click Me
        </button>

        <p class="note">
            Open the browser console (F12 → Console) to view the output.
        </p>

    </div>

    <!-- Load JavaScript after HTML -->
    <script src="script.js"></script>

</body>

</html>
