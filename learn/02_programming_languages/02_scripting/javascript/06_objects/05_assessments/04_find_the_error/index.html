<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS · MCQ + Find the Error</title>
    <style>
        /* ----- quiz.css (embedded) ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b1424 0%, #1a263f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.8rem 1.2rem;
        }

        .quiz-wrapper {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(6px);
            border-radius: 3rem;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.04);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #eef5ff;
            display: flex;
            align-items: center;
            gap: 0.65rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 0.75rem;
            margin-bottom: 2rem;
        }

        h1 small {
            font-size: 1rem;
            font-weight: 400;
            background: #2d3b5a;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            color: #b6cbf0;
            margin-left: auto;
            letter-spacing: 0.3px;
        }

        .question-card {
            background: rgba(18, 28, 48, 0.7);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            padding: 1.8rem 2rem;
            margin-bottom: 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
            transition: 0.15s;
        }

        .question-card:hover {
            border-color: rgba(120, 180, 255, 0.15);
        }

        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.9rem;
        }

        .q-badge {
            font-weight: 600;
            font-size: 0.8rem;
            color: #7f9bda;
            background: #1f2c47;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .q-type {
            background: #2a3d66;
            color: #b6d0ff;
            font-size: 0.7rem;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-weight: 500;
        }

        .q-text {
            font-size: 1.25rem;
            font-weight: 500;
            color: #e3edff;
            line-height: 1.4;
            margin-bottom: 1.2rem;
        }

        .code-snippet {
            background: #0d1529;
            border-radius: 1.2rem;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.4rem;
            border-left: 4px solid #4b7bec;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            color: #c8dfff;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid #2a3d66;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(255, 255, 255, 0.02);
            padding: 0.7rem 1.2rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: 0.15s;
            cursor: pointer;
        }

        .option:hover {
            background: rgba(70, 110, 200, 0.08);
            border-color: rgba(100, 160, 255, 0.2);
        }

        .option input[type="radio"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid #4e6390;
            border-radius: 50%;
            outline: none;
            transition: 0.12s;
            flex-shrink: 0;
            cursor: pointer;
        }

        .option input[type="radio"]:checked {
            border: 6px solid #7aa5ff;
            background: #1a2744;
            box-shadow: 0 0 0 2px #3a5f9e;
        }

        .option label {
            font-size: 1.05rem;
            color: #d3e0fd;
            cursor: pointer;
            flex: 1;
            padding: 0.2rem 0;
            letter-spacing: 0.2px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 1.8rem 0 1.2rem;
        }

        .score-badge {
            background: #1c2b4a;
            padding: 0.4rem 1.5rem;
            border-radius: 80px;
            color: #b3ccff;
            font-weight: 500;
            font-size: 1rem;
            border: 1px solid #2b3d64;
        }

        .score-badge span {
            font-weight: 700;
            color: #d6e5ff;
            margin: 0 0.2rem;
        }

        .action-group {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .btn {
            background: transparent;
            border: 1px solid #3c5080;
            padding: 0.5rem 1.6rem;
            border-radius: 60px;
            color: #c7daff;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.15s;
            backdrop-filter: blur(2px);
            background: rgba(20, 35, 70, 0.3);
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: #4b7bec;
            border: 1px solid #5f8cff;
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(50, 100, 255, 0.2);
        }

        .btn-primary:hover {
            background: #3f6ee0;
            transform: scale(1.02);
            box-shadow: 0 6px 16px rgba(50, 100, 255, 0.3);
            border-color: #7aa3ff;
        }

        .btn-secondary:hover {
            background: #2f4068;
            border-color: #6c89c0;
            color: white;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .message-box {
            background: #17223b;
            border-radius: 60px;
            padding: 0.6rem 1.8rem;
            text-align: center;
            color: #b3ceff;
            font-size: 0.95rem;
            border-left: 4px solid #4b7bec;
            margin-top: 1.2rem;
            border: 1px solid #2a3e66;
            font-weight: 400;
        }

        .message-box strong {
            color: #d6e8ff;
        }

        @media (max-width: 600px) {
            .quiz-wrapper {
                padding: 1.5rem 1rem;
                border-radius: 2rem;
            }
            h1 {
                font-size: 1.8rem;
                flex-wrap: wrap;
            }
            .q-text {
                font-size: 1.1rem;
            }
            .code-snippet {
                font-size: 0.85rem;
                padding: 1rem;
            }
            .option {
                padding: 0.6rem 1rem;
            }
            .status-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .action-group {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div class="quiz-wrapper">
    <h1>
        🧩 JS · mixed
        <small>10 questions</small>
    </h1>

    <div id="questionsContainer"></div>

    <div class="status-bar">
        <div class="score-badge">
            🎯 <span id="scoreDisplay">0</span> / 10
        </div>
        <div class="action-group">
            <button class="btn btn-secondary" id="resetBtn">⟳ reset</button>
            <button class="btn btn-primary" id="submitBtn">✓ submit</button>
        </div>
    </div>
    <div id="feedbackMessage" class="message-box">
        ⚡ choose an option for each question
    </div>
</div>

<script>
    // ----- questions / error_01.js , error_02.js , error_03.js (embedded) -----
    // Mixed: 7 MCQ + 3 "find the error" (with code snippets)
    const questionsData = [
        // ---- MCQ (classic) ----
        {
            id: 1,
            type: 'mcq',
            question: 'Which method converts an object to a JSON string?',
            options: ['JSON.stringify()', 'JSON.parse()', 'object.toJSON()', 'JSON.encode()'],
            correct: 0
        },
        {
            id: 2,
            type: 'mcq',
            question: 'What does `Object.values({ a: 1, b: 2 })` return?',
            options: ['[1, 2]', '["a", "b"]', '{ a: 1, b: 2 }', 'undefined'],
            correct: 0
        },
        {
            id: 3,
            type: 'mcq',
            question: 'Which of these creates a shallow copy of an object?',
            options: ['Object.assign({}, obj)', 'obj.clone()', 'Object.copy(obj)', 'obj.slice()'],
            correct: 0
        },
        {
            id: 4,
            type: 'mcq',
            question: 'What is the prototype of an object created with `{}` ?',
            options: ['Object.prototype', 'null', 'Array.prototype', 'Function.prototype'],
            correct: 0
        },
        {
            id: 5,
            type: 'mcq',
            question: 'How to prevent adding new properties to an object?',
            options: ['Object.freeze()', 'Object.seal()', 'Object.lock()', 'Object.prevent()'],
            correct: 0
        },
        {
            id: 6,
            type: 'mcq',
            question: 'What does `obj.hasOwnProperty(\'name\')` check?',
            options: ['Own property (not inherited)', 'Any property (including inherited)', 'Method existence', 'Type of property'],
            correct: 0
        },
        {
            id: 7,
            type: 'mcq',
            question: 'Which statement is true about object property keys?',
            options: ['Only strings', 'Only symbols', 'Strings or symbols', 'Numbers only'],
            correct: 2
        },

        // ---- "Find the error" (with code) ----
        {
            id: 8,
            type: 'error',
            question: 'Find the error in this code:',
            code: `const user = {\n  name: "Alex",\n  age: 30,\n  greet: () => {\n    console.log("Hello " + this.name);\n  }\n};\nuser.greet();`,
            options: [
                'Arrow function binds `this` to lexical scope (not user)',
                'Missing semicolon',
                '`name` should be a string literal',
                'No error'
            ],
            correct: 0
        },
        {
            id: 9,
            type: 'error',
            question: 'Find the error in this code:',
            code: `const obj = { a: 1, b: 2 };\nObject.freeze(obj);\nobj.a = 99;\nconsole.log(obj.a);`,
            options: [
                'Cannot assign to frozen property (silent fail in non-strict)',
                'SyntaxError',
                '`Object.freeze` throws an error',
                'No error, obj.a becomes 99'
            ],
            correct: 0
        },
        {
            id: 10,
            type: 'error',
            question: 'Find the error in this code:',
            code: `const person = {\n  firstName: "Jane",\n  lastName: "Doe",\n  fullName: function() {\n    return this.firstName + " " + this.lastName;\n  }\n};\nconst getName = person.fullName;\nconsole.log(getName());`,
            options: [
                '`this` refers to global (undefined) – loses context',
                '`fullName` is not a function',
                'Missing parentheses',
                'No error'
            ],
            correct: 0
        }
    ];

    // ----- quiz.js (controller) -----
    (function() {
        const container = document.getElementById('questionsContainer');
        const scoreSpan = document.getElementById('scoreDisplay');
        const feedbackEl = document.getElementById('feedbackMessage');
        const resetBtn = document.getElementById('resetBtn');
        const submitBtn = document.getElementById('submitBtn');

        let selectedAnswers = new Array(questionsData.length).fill(null);
        let submitted = false;

        function renderQuestions() {
            let html = '';
            questionsData.forEach((q, idx) => {
                const qNum = idx + 1;
                const selectedVal = selectedAnswers[idx] !== null ? selectedAnswers[idx] : '';
                const typeLabel = q.type === 'error' ? '🔎 find error' : '📘 MCQ';
                const codeBlock = q.code ? `<div class="code-snippet">${q.code}</div>` : '';

                html += `
                    <div class="question-card" data-qindex="${idx}">
                        <div class="q-header">
                            <span class="q-badge">Q${qNum}</span>
                            <span class="q-type">${typeLabel}</span>
                        </div>
                        <div class="q-text">${q.question}</div>
                        ${codeBlock}
                        <div class="options">
                            ${q.options.map((opt, optIdx) => {
                                const isChecked = (selectedAnswers[idx] === optIdx) ? 'checked' : '';
                                return `
                                    <div class="option">
                                        <input type="radio" name="q${idx}" value="${optIdx}" id="q${idx}_opt${optIdx}" ${isChecked}>
                                        <label for="q${idx}_opt${optIdx}">${opt}</label>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;

            // attach radio change events
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.addEventListener('change', function(e) {
                    const name = this.name;
                    const qIndex = parseInt(name.substring(1), 10);
                    const value = parseInt(this.value, 10);
                    if (!isNaN(qIndex) && !isNaN(value)) {
                        selectedAnswers[qIndex] = value;
                        if (submitted) {
                            submitted = false;
                            feedbackEl.innerHTML = '✏️ answers updated — press submit again';
                            feedbackEl.style.borderLeftColor = '#f0b34b';
                        }
                        updateScoreDisplay();
                    }
                });
            });
        }

        function computeScore() {
            let correctCount = 0;
            for (let i = 0; i < questionsData.length; i++) {
                const selected = selectedAnswers[i];
                if (selected !== null && selected === questionsData[i].correct) {
                    correctCount++;
                }
            }
            return correctCount;
        }

        function updateScoreDisplay() {
            const currentScore = computeScore();
            scoreSpan.textContent = currentScore;
            return currentScore;
        }

        function showSubmitFeedback() {
            const currentScore = computeScore();
            const total = questionsData.length;
            const allAnswered = selectedAnswers.every(ans => ans !== null);

            if (!allAnswered) {
                const missing = selectedAnswers.filter(ans => ans === null).length;
                feedbackEl.innerHTML = `⚠️ ${missing} question(s) left unanswered. Please complete all.`;
                feedbackEl.style.borderLeftColor = '#e68a4a';
                submitted = false;
                return;
            }

            submitted = true;
            let message = '';
            let borderColor = '#4b7bec';
            if (currentScore === total) {
                message = `🎉 Perfect! ${currentScore}/${total} — you aced it!`;
                borderColor = '#6fcf97';
            } else if (currentScore >= total * 0.7) {
                message = `👍 Great! ${currentScore}/${total} correct. Keep it up!`;
                borderColor = '#f2c94a';
            } else {
                message = `📘 ${currentScore}/${total} correct. Review objects and context.`;
                borderColor = '#eb5757';
            }
            feedbackEl.style.borderLeftColor = borderColor;
            feedbackEl.innerHTML = message;
            scoreSpan.textContent = currentScore;
        }

        function resetQuiz() {
            selectedAnswers = new Array(questionsData.length).fill(null);
            submitted = false;
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.checked = false;
            });
            renderQuestions();
            feedbackEl.style.borderLeftColor = '#4b7bec';
            feedbackEl.innerHTML = '🔄 reset — choose your answers';
            scoreSpan.textContent = '0';
        }

        function handleSubmit() {
            document.querySelectorAll('input[type="radio"]:checked').forEach(radio => {
                const name = radio.name;
                const qIndex = parseInt(name.substring(1), 10);
                const value = parseInt(radio.value, 10);
                if (!isNaN(qIndex) && !isNaN(value)) {
                    selectedAnswers[qIndex] = value;
                }
            });
            updateScoreDisplay();
            showSubmitFeedback();
        }

        // initial render
        renderQuestions();
        updateScoreDisplay();
        feedbackEl.innerHTML = '✨ select an option for each question';

        submitBtn.addEventListener('click', handleSubmit);
        resetBtn.addEventListener('click', resetQuiz);
    })();
</script>

</body>
</html>
