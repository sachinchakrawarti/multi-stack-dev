<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Color Palette Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CSS Color Palette</h1>

    <p class="description">
        A color palette is a collection of colors used consistently throughout a website or application.
    </p>

    <section class="palette">

        <div class="color primary">
            <h2>Primary</h2>
            <p>#1565C0</p>
        </div>

        <div class="color secondary">
            <h2>Secondary</h2>
            <p>#0D47A1</p>
        </div>

        <div class="color success">
            <h2>Success</h2>
            <p>#2E7D32</p>
        </div>

        <div class="color warning">
            <h2>Warning</h2>
            <p>#F9A825</p>
        </div>

        <div class="color danger">
            <h2>Danger</h2>
            <p>#D32F2F</p>
        </div>

        <div class="color neutral">
            <h2>Neutral</h2>
            <p>#455A64</p>
        </div>

    </section>

</body>
</html>
