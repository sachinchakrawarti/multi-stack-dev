<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- React CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    
    <!-- ReactDOM CDN -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel Standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <title>React - CDN Template</title>
    
    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #root {
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }
        
        /* Template Styles */
        .container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        h1 {
            font-size: 32px;
            color: #58a6ff;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #8b949e;
            font-size: 16px;
        }
        
        .status {
            margin-top: 20px;
            padding: 12px 24px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            display: inline-block;
            color: #3fb950;
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <!-- React App -->
    <script type="text/babel" src="./app.jsx"></script>

</body>
</html>
