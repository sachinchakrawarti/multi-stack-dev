<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested Selectors Example</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <h1>Nested Selectors</h1>

        <nav>
            <a href="#">Home</a>
            <a href="#">Courses</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main>

        <section class="card">
            <h2>Web Development</h2>

            <p>
                This heading and paragraph are inside the card component.
            </p>

            <button>Read More</button>
        </section>

        <section class="profile">

            <h2>User Profile</h2>

            <p>
                Nested selectors can target only this section.
            </p>

            <button>Edit Profile</button>

        </section>

    </main>

</body>
</html>
