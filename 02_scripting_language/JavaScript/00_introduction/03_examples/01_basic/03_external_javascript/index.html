<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03 - External JavaScript</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1 id="heading">External JavaScript</h1>

        <p>
            This example demonstrates how to link an external JavaScript file using the
            <code>&lt;script src=""&gt;</code> tag.
        </p>

        <button id="messageBtn">
            Click Me
        </button>

        <p class="note">
            Open the browser console (F12 → Console) to view the output.
        </p>

    </div>

    <!-- External JavaScript -->
    <script src="script.js"></script>

</body>

</html>
