<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03 - Welcome App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🎉 Welcome App</h1>

        <p>
            Enter your name below and click the button to receive a personalized welcome message.
        </p>

        <input
            type="text"
            id="nameInput"
            placeholder="Enter your name"
        >

        <button id="welcomeBtn">
            Welcome Me
        </button>

        <div id="message" class="message">
            Your personalized message will appear here.
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
